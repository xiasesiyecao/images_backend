spring:
  datasource:
    url: jdbc:h2:file:/app/data/docker_asset;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:
    driver-class-name: org.h2.Driver
  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema-h2.sql
  h2:
    console:
      enabled: true
      path: /h2-console
